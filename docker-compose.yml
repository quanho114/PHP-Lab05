version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-lab05
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "web_php_lab05"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  web:
    build: .
    container_name: php-web-lab05-app
    network_mode: "host"
    volumes:
      - .:/app
    depends_on:
      - db
    restart: always

volumes:
  mysql_data:
